# rust-analyzer inlay hint tuning.
# The global on/off switch lives in config.toml (editor.lsp.display-inlay-hints).
# This block controls *which* categories rust-analyzer emits.
[language-server.rust-analyzer.config.inlayHints]
typeHints.enable = true          # inferred types after `let` bindings
parameterHints.enable = false    # `name:` hints at call sites
chainingHints.enable = false     # intermediate types in method chains
closingBraceHints.enable = false # `// fn foo` after long closing braces
bindingModeHints.enable = false  # `ref`/`mut` hints in patterns

# ================================================================================================
# ESLint (vscode-eslint-language-server)
# Same engine nvim uses — resolves the project-LOCAL eslint from node_modules automatically.
# nodePath = ""     → walk up from the file to find node_modules/.bin/eslint (never uses global)
# workingDirectory  → "auto" infers CWD from package.json/eslint.config.js, so each package in a
#                     pnpm monorepo gets its own eslint + config, exactly like VSCode does.
# useFlatConfig is intentionally omitted: ESLint ≥9 enables it by default; <9 ignores it.
# ================================================================================================
[language-server.eslint]
command = "vscode-eslint-language-server"
args = ["--stdio"]

[language-server.eslint.config]
nodePath = ""
validate = "on"
run = "onType"
problems = { shortenToSingleLine = false }
rulesCustomizations = []
experimental = {}

[language-server.eslint.config.workingDirectory]
mode = "auto"

[language-server.eslint.config.codeAction.disableRuleComment]
enable = true
location = "separateLine"

[language-server.eslint.config.codeAction.showDocumentation]
enable = false

[[language]]
name = "javascript"
language-servers = ["typescript-language-server", "eslint"]
formatter = { command = "prettier", args = ["--parser", "babel"] }
auto-format = true

[[language]]
name = "jsx"
